server {
    # ==============================================================================
    # REVERSE PROXY: DNS to Internal Port Mapping
    # ==============================================================================
    # KEY CONCEPT: This nginx server acts as a REVERSE PROXY
    #
    # THE FLOW:
    # 1. DNS Resolution: spring.opencodingsociety.com → Your server's public IP
    # 2. Nginx listens on port 80/443 (standard HTTP/HTTPS ports)
    # 3. Nginx receives the request for spring.opencodingsociety.com
    # 4. Nginx FORWARDS (proxies) the request to localhost:8585 (Spring Boot app)
    # 5. Spring Boot processes the request and returns response to nginx
    # 6. Nginx sends the response back to the client
    #
    # NETWORK LAYERS: How data travels across the internet
    # When browser sends request → travels DOWN the OSI layers:
    #   Layer 7 (Application): HTTP/HTTPS request created
    #   Layer 6 (Presentation): Encryption (TLS/SSL)
    #   Layer 5 (Session): Connection management
    #   Layer 4 (Transport): TCP segments with ports (443)
    #   Layer 3 (Network): IP packets with addresses (24.18.xxx.xxx → 3.233.212.71)
    #   Layer 2 (Data Link): Ethernet frames (MAC addresses)
    #   Layer 1 (Physical): Electrical signals on wire/fiber
    #
    # At server → travels UP the layers:
    #   Physical signals → Ethernet → IP packets → TCP → HTTP → NGINX processes
    #
    # Response follows same path backwards (down on server, up at client)
    #
    # WHY USE A REVERSE PROXY? (Key Teaching Points)
    # - SECURITY: Spring app only listens on localhost (not exposed to internet)
    # - SSL/TLS: Nginx handles HTTPS encryption (certbot/Let's Encrypt integration)
    # - PORT MAPPING: Users access standard port 80/443, not obscure port 8585
    # - MULTIPLE APPS: One server can host many apps on different ports
    #   Example: spring.opencodingsociety.com → localhost:8585, flask.opencodingsociety.com → localhost:8587
    # - LOAD BALANCING: Can distribute requests across multiple backend servers
    # - CACHING: Nginx can cache responses to improve performance
    #
    # WITHOUT REVERSE PROXY: Users would need spring.opencodingsociety.com:8585
    # WITH REVERSE PROXY: Users access clean URL spring.opencodingsociety.com
    # ==============================================================================
    server_name spring.opencodingsociety.com;
    
    # ==============================================================================
    # PROXY CONFIGURATION: Forwarding to Backend Application
    # ==============================================================================
    # location / means "match ALL paths" (/, /api/users, /api/data, etc.)
    # Everything goes to the Spring Boot application on port 8585
    # ==============================================================================
    location / {
        # CRITICAL LINE: Forward all requests to Spring Boot on localhost:8585
        # localhost = this same server (internal communication only)
        # 8585 = the port where Spring Boot is listening (configured in application.properties)
        proxy_pass http://localhost:8585;
        
        # ==============================================================================
        # THE COMPLETE REQUEST/RESPONSE STORY
        # ==============================================================================
        # SCENARIO: Student at home visits pages.opencodingsociety.com
        #
        # FORWARD PATH (Request):
        #   1. Student's browser (IP: 24.18.xxx.xxx from home ISP)
        #      → Visits pages.opencodingsociety.com (GitHub Pages: 185.199.110.153)
        #      → Downloads HTML/JavaScript to browser
        #
        #   2. JavaScript in browser makes API call:
        #      GET https://spring.opencodingsociety.com/api/users
        #      → Student's home router → ISP network → Internet
        #      → Arrives at spring.opencodingsociety.com (3.233.212.71)
        #
        #   3. NGINX (3.233.212.71) receives request at port 443:
        #      Request headers from browser:
        #        Host: spring.opencodingsociety.com
        #        Origin: https://pages.opencodingsociety.com
        #        Client IP: 24.18.xxx.xxx
        #
        #   4. NGINX proxies to localhost:8585 (Spring Boot)
        #      WITHOUT proxy_set_header, Spring would see:
        #        Host: localhost:8585              ← WRONG! Lost the domain
        #        IP: 127.0.0.1                     ← WRONG! Shows nginx, not student
        #
        #      WITH proxy_set_header, Spring correctly sees:
        #        Host: spring.opencodingsociety.com    ← Original domain preserved
        #        X-Real-IP: 24.18.xxx.xxx               ← Student's actual IP
        #        X-Forwarded-For: 24.18.xxx.xxx         ← Chain of IPs (just student here)
        #        X-Forwarded-Proto: https               ← Student used HTTPS
        #        X-Forwarded-Host: spring.opencodingsociety.com  ← Original Host header
        #        X-Forwarded-Port: 443                  ← Student connected on port 443
        #
        # REVERSE PATH (Response):
        #   Spring Boot → NGINX → Internet → ISP → Home Router → Student's Browser
        #   (Same path backwards)
        #
        # WHY THIS MATTERS:
        # - Spring Boot can log the real student IP (24.18.xxx.xxx) for security
        # - Spring Boot knows the original domain for generating correct URLs
        # - If there were HTTP proxies (rare), X-Forwarded-For would show the chain
        # - Host vs X-Forwarded-Host: Both same value here; X-Forwarded-Host needed 
        #   if you add load balancers later (Host gets rewritten, X-Forwarded-Host preserved)
        # ==============================================================================
        
        proxy_set_header Host $host;                          # Original domain: spring.opencodingsociety.com
        proxy_set_header X-Real-IP $remote_addr;              # Student's IP: 24.18.xxx.xxx
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;  # IP chain (student's IP)
        proxy_set_header X-Forwarded-Proto $scheme;           # Protocol: https
        proxy_set_header X-Forwarded-Host $host;              # Original Host header (for load balancer setups)
        proxy_set_header X-Forwarded-Port $server_port;       # Port: 443

        # ==============================================================================
        # CORS SECURITY: Origin Validation - BLOCKS UNAUTHORIZED REQUESTERS
        # ==============================================================================
        # This configuration implements a whitelist approach to CORS (Cross-Origin Resource Sharing).
        # In DEPLOYMENT, only requests from approved origins can access this API.
        # 
        # This prevents unauthorized websites from making requests to your API.
        # ==============================================================================
        
        set $cors_origin "";  # Start with empty string - deny all by default
        
        # Approve all request from opencodingsociety.com subdomains (e.g., frontend.opencodingsociety.com)
        # Using RFC 1123 compliant pattern for production security:
        #   - [a-z0-9-]+ restricts to valid subdomain characters (letters, numbers, hyphens)
        #   - https? allows both HTTP (development) and HTTPS (production)
        #   - * quantifier supports multi-level subdomains (e.g., dev.api.opencodingsociety.com)
        if ($http_origin ~* "^https?://([a-z0-9-]+\.)*opencodingsociety\.com$") {
            set $cors_origin $http_origin;
        }
        
        # Approve GitHub Pages deployments from open-coding-society organization (e.g., https://open-coding-society.github.io)
        if ($http_origin = "https://open-coding-society.github.io") {
            set $cors_origin $http_origin;
        }
        
        # ==============================================================================
        # CROSS-ORIGIN REQUESTS: 2-PART PROCESS
        # ==============================================================================
        # PART 1: PREFLIGHT CHECK (handled here by nginx)
        #   - Browser sends OPTIONS request to check permissions
        #   - Nginx validates origin and responds with CORS headers
        #   - Never reaches Spring application - handled entirely by nginx
        #   - If origin not approved, browser blocks the entire sequence
        #
        # PART 2: ACTUAL REQUEST (handled by Spring application)
        #   - After preflight succeeds, browser sends the real request (GET, POST, etc.)
        #   - Nginx proxies this request to Spring Boot on localhost:8585
        #   - Spring application processes the business logic and returns response
        #   - Spring may also add CORS headers for non-preflight responses
        #
        # This separation improves security (nginx blocks bad origins before they reach app)
        # and performance (nginx handles lightweight preflight checks efficiently).
        # ==============================================================================
        
        if ($request_method = OPTIONS) {
            # Tell browser: yes, include cookies/auth credentials in requests
            add_header "Access-Control-Allow-Credentials" "true" always;
            
            # Tell browser: this origin is allowed (only set if origin was approved above)
            add_header "Access-Control-Allow-Origin" $cors_origin always;
            
            # Tell browser: these HTTP methods are permitted
            add_header "Access-Control-Allow-Methods" "GET, POST, PUT, OPTIONS, HEAD" always;
            
            # Cache preflight response for 10 minutes (600 seconds) to reduce overhead
            add_header "Access-Control-Allow-Max-Age" 600 always;
            
            # Tell browser: these request headers are allowed
            add_header "Access-Control-Allow-Headers" "Authorization, Origin, X-Origin, X-Requested-With, Content-Type, Accept" always;
            
            # Return 204 No Content - preflight successful (if origin was approved)
            return 204;
        }

    }
}

# ==============================================================================
# WebSocket Server Block for Port 8589 (/ws-chat)
# ==============================================================================
# KEY CONCEPT: WebSockets vs. Regular HTTP
#
# HTTP (what the first server block handles):
#   - Request/Response pattern: client asks, server answers, connection closes
#   - Stateless: every request is independent
#   - One-way initiation: only the client can start a conversation
#
# WebSocket (what THIS server block handles):
#   - Persistent, full-duplex connection: stays open for minutes/hours
#   - Either side can push data at any time (server → client without asking!)
#   - Perfect for: chat apps, live notifications, multiplayer games, stock tickers
#
# THE UPGRADE DANCE:
#   1. Browser opens a normal HTTPS connection to port 8589
#   2. Browser sends "Upgrade: websocket" header asking to switch protocols
#   3. Server responds with "101 Switching Protocols"
#   4. Same TCP connection now speaks WebSocket frames instead of HTTP
#   5. Both sides freely send messages until someone closes the connection
#
# WHY A SEPARATE PORT (8589) FROM THE HTTP APP (8585)?
#   - Spring Boot runs the WebSocket server on port 8589 as a separate endpoint
#   - Keeps WebSocket traffic isolated from REST API traffic (easier to debug)
#   - Allows different timeout/buffering policies per protocol
#   - Clients connect via wss://spring.opencodingsociety.com:8589/ws-chat
# ==============================================================================
server {
    # Listen on port 8589 with TLS (wss://) on both IPv4 and IPv6
    # "ssl" = this port requires an encrypted handshake before any data flows
    listen 8589 ssl;
    listen [::]:8589 ssl;
    server_name spring.opencodingsociety.com;

    # ----------------------------------------------------------------------
    # TLS CERTIFICATES
    # ----------------------------------------------------------------------
    # Reuse the same Let's Encrypt certs issued for port 443.
    # One cert covers the domain regardless of port, so no separate issuance needed.
    # certbot auto-renews these files; nginx reloads pick up the new cert.
    # ----------------------------------------------------------------------
    ssl_certificate /etc/letsencrypt/live/spring.opencodingsociety.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/spring.opencodingsociety.com/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;   # Hardened cipher suite defaults
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;     # Diffie-Hellman params for key exchange

    location / {
        # Forward the (soon-to-be-upgraded) connection to Spring Boot's
        # WebSocket endpoint listening on localhost:8589.
        proxy_pass http://localhost:8589;

        # ------------------------------------------------------------------
        # WEBSOCKET UPGRADE HEADERS — the magic that turns HTTP into WebSocket
        # ------------------------------------------------------------------
        # HTTP/1.1 is REQUIRED: the Upgrade mechanism does not exist in HTTP/1.0,
        # and nginx defaults to HTTP/1.0 when talking to upstreams. Without this
        # line, the upgrade request silently fails and the browser sees an error.
        proxy_http_version 1.1;

        # Forward the client's "Upgrade: websocket" header to Spring Boot.
        # $http_upgrade is whatever the client sent (usually "websocket").
        proxy_set_header Upgrade $http_upgrade;

        # Hardcode "upgrade" here (NOT $http_connection) because some clients
        # send "Connection: keep-alive, Upgrade" and nginx needs a clean value.
        proxy_set_header Connection "upgrade";

        # ------------------------------------------------------------------
        # STANDARD PROXY HEADERS — same purpose as the HTTP block above
        # ------------------------------------------------------------------
        # Preserve the original domain so Spring's WebSocket handler sees the
        # real hostname instead of "localhost:8589".
        proxy_set_header Host $host;

        # Pass the client's true IP so chat logs/moderation see the real user,
        # not 127.0.0.1 (which is what every connection would look like otherwise).
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

        # Tell Spring the client connected via HTTPS/WSS so any URLs it builds
        # use the secure scheme.
        proxy_set_header X-Forwarded-Proto $scheme;

        # ------------------------------------------------------------------
        # IDLE TIMEOUT TUNING — keep the socket alive during quiet periods
        # ------------------------------------------------------------------
        # Default nginx timeout is 60 seconds: if NO data flows for 60s, nginx
        # kills the connection. That's fatal for chat apps where users may
        # idle for hours between messages.
        #
        # 86400 seconds = 24 hours. Long enough that real chat sessions stay
        # connected, short enough that truly dead connections eventually get
        # cleaned up instead of leaking forever.
        #
        # Alternative: implement app-level ping/pong frames to keep the
        # connection "active" — but raising the timeout is simpler.
        proxy_read_timeout 86400;    # How long nginx waits for data FROM Spring
        proxy_send_timeout 86400;    # How long nginx waits to send data TO Spring
    }
}